<style>
  :root{
    --cream:#FCF0E6;
    --cream-deep:#F6E4D3;
    --red:#E1352A;
    --red-deep:#C32A20;
    --ink:#2C2A28;
    --soft:#6E635B;
    --card-w:440px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Fredoka',system-ui,sans-serif;
    background:#E8D5C2;
    color:var(--ink);
    line-height:1.5;
    display:flex;justify-content:center;
    min-height:100vh;
    overscroll-behavior-y:none;
  }
  .card{
    width:100%;max-width:var(--card-w);
    background:var(--cream);
    min-height:100vh;
    box-shadow:0 0 60px rgba(0,0,0,.12);
    position:relative;overflow:hidden;
  }

  /* dotted texture accent */
  .card::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(var(--cream-deep) 1.3px,transparent 1.3px);
    background-size:22px 22px;opacity:.55;z-index:0;
  }
  .card > *{position:relative;z-index:1}

  .pad{padding:0 26px}

  /* HERO */
  .hero{padding-top:34px}
  .eyebrow{
    font-family:'Bagel Fat One',cursive;
    color:var(--red);
    font-size:clamp(34px,10vw,44px);
    line-height:1.02;
    letter-spacing:.5px;
    text-align:right;
    margin-bottom:18px;
  }
  .frame{
    border-radius:18px;overflow:hidden;
    box-shadow:0 10px 28px rgba(44,42,40,.16);
    aspect-ratio:3/2;
  }
  .frame img{width:100%;height:100%;object-fit:cover;display:block}
  .save{
    font-family:'Bagel Fat One',cursive;
    color:var(--red);
    font-size:clamp(26px,7.4vw,33px);
    line-height:1.06;
    margin:24px 0 6px;
  }
  .save small{display:block;font-size:.5em;color:var(--soft);font-family:'Fredoka';font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}

  /* COUNTDOWN */
  .count{
    display:flex;gap:8px;margin:18px 0 30px;
  }
  .cell{
    flex:1;background:#fff;border-radius:14px;
    padding:12px 4px 10px;text-align:center;
    box-shadow:0 4px 14px rgba(44,42,40,.07);
  }
  .cell b{
    display:block;font-family:'Bagel Fat One',cursive;
    color:var(--red);font-size:clamp(22px,6.5vw,28px);line-height:1;
  }
  .cell span{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:1px;font-weight:500}

  /* DIVIDER */
  .wave{display:block;width:100%;height:40px;color:var(--cream-deep)}

  /* NAMES */
  .names{
    background:var(--cream-deep);
    padding:34px 26px 38px;
    margin-top:-2px;
  }
  .names h1{
    font-family:'Bagel Fat One',cursive;
    color:var(--red);
    font-size:clamp(38px,12vw,54px);
    text-align:center;line-height:1;
    margin-bottom:22px;
  }
  .gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
  .gallery .tall{grid-row:span 2;aspect-ratio:auto}
  .gallery img{width:100%;height:100%;object-fit:cover;display:block;border-radius:13px;box-shadow:0 6px 18px rgba(44,42,40,.13)}
  .g-ring{aspect-ratio:3/2}
  .g-bottom{aspect-ratio:3/2}
  .ja{
    font-family:'Bagel Fat One',cursive;color:var(--red);
    font-size:clamp(22px,6.5vw,28px);text-align:center;margin-bottom:8px;
  }
  .blurb{text-align:center;color:var(--ink);font-size:16px;max-width:30ch;margin:0 auto 26px}
  .blurb b{color:var(--red-deep);font-weight:600}

  /* CTA */
  .cta{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;background:var(--red);color:#fff;border:none;
    font-family:'Fredoka';font-weight:600;font-size:17px;
    padding:16px;border-radius:16px;cursor:pointer;
    box-shadow:0 8px 22px rgba(225,53,42,.32);
    transition:transform .15s ease,box-shadow .15s ease;
    text-decoration:none;
  }
  .cta:active{transform:scale(.97)}
  .cta svg{width:20px;height:20px}
  .cta.ghost{background:#fff;color:var(--red);box-shadow:0 4px 14px rgba(44,42,40,.1)}
  .row{display:flex;gap:10px;margin-top:10px}
  .row .cta{flex:1;font-size:16px;padding:15px 8px}

  .foot{text-align:center;color:var(--soft);font-size:13px;padding:22px 26px 34px}
  .foot .heart{color:var(--red)}

  /* reveal */
  .rv{opacity:0;transform:translateY(16px);transition:opacity .7s ease,transform .7s ease}
  .rv.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){.rv{opacity:1;transform:none;transition:none}}

  @media(min-width:441px){.card{margin:0;border-radius:0}}
</style>
</head>

<script>
(function(){
  var target = new Date(2027,4,29,0,0,0).getTime();
  function pad(n){return n<10?'0'+n:''+n;}
  function tick(){
    var diff = target - Date.now();
    if(diff<0)diff=0;
    var d=Math.floor(diff/864e5),
        h=Math.floor(diff%864e5/36e5),
        m=Math.floor(diff%36e5/6e4),
        s=Math.floor(diff%6e4/1e3);
    document.getElementById('d').textContent=d;
    document.getElementById('h').textContent=pad(h);
    document.getElementById('m').textContent=pad(m);
    document.getElementById('s').textContent=pad(s);
  }
  tick();setInterval(tick,1000);

  // share
  document.getElementById('share').addEventListener('click',function(e){
    e.preventDefault();
    var data={title:'Denia & Dominik heiraten!',text:'Save the Date: 29. Mai 2027 – haltet euch den Tag frei!',url:location.href};
    if(navigator.share){navigator.share(data).catch(function(){});}
    else{navigator.clipboard&&navigator.clipboard.writeText(location.href);this.textContent='Link kopiert!';}
  });

  // reveal on scroll
  var els=document.querySelectorAll('.rv');
  if('IntersectionObserver'in window){
    var io=new IntersectionObserver(function(en){en.forEach(function(x){if(x.isIntersecting){x.target.classList.add('in');io.unobserve(x.target);}});},{threshold:.12});
    els.forEach(function(el){io.observe(el);});
  }else{els.forEach(function(el){el.classList.add('in');});}
})();
</script>
